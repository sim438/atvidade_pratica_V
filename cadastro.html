<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <main class="container">
    <h1>Cadastro</h1>
    <form action="feed.html">
      <label>Nome<input type="text" required></label>
      <label>E-mail<input type="email" required></label>
      <label>Usuário<input type="text" required></label>
      <label> Senha<input type="password" required></label>  
      <label>Confirmação de Senha<input type="password" required></label> 
      <label>Gênero
         <select required>
          <option value="Selecione"></option>
          <option>Masculino</option>
          <option>Feminino</option>
          <option>Outro</option>
        </select>
      </label>
      <label>Data de Nascimento<input type="date" required></label>
      <button type="submit">Cadastrar</button>
    </form>
    <p><a href="index.html">Já possuo uma conta</a>
    </p>
  </main>
</body>
</html>
